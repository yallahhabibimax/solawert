<body class="font-body antialiased overflow-x-hidden" style="background:#FFFFFF;color:#14171C">
  <div id="scroll-progress"></div>
  <div id="root"></div>
  <script>
  (function(){
    try{ history.scrollRestoration = 'manual'; }catch(e){}
    var KEY = 'sw_scrollY';
    var hash = location.hash && location.hash.length > 1 ? location.hash.slice(1) : '';
    addEventListener('scroll', function(){ try{ sessionStorage.setItem(KEY, String(Math.round(scrollY))); }catch(e){} }, {passive:true});
    function scrollToHash(){
      var tries = 0, userScrolled = false;
      function onUser(){ userScrolled = true; }
      addEventListener('wheel', onUser, {passive:true, once:true});
      addEventListener('touchmove', onUser, {passive:true, once:true});
      var iv = setInterval(function(){
        if(userScrolled){ clearInterval(iv); return; }
        var el = document.getElementById(hash);
        if(el){
          var nav = document.querySelector('.sw-navwrap');
          var off = nav ? nav.offsetHeight : 80;
          var y = el.getBoundingClientRect().top + window.scrollY - off + 8;
          window.scrollTo({ top: y, behavior: tries === 0 ? 'auto' : 'smooth' });
          tries++;
          if(tries > 40) clearInterval(iv);
        } else {
          tries++;
          if(tries > 80) clearInterval(iv);
        }
      }, 60);
    }
    function restore(){
      var y = 0; try{ y = parseInt(sessionStorage.getItem(KEY) || '0', 10); }catch(e){}
      if(!y) return;
      var tries = 0, userScrolled = false;
      function onUser(){ userScrolled = true; }
      addEventListener('wheel', onUser, {passive:true, once:true});
      addEventListener('touchmove', onUser, {passive:true, once:true});
      var iv = setInterval(function(){
        if(userScrolled){ clearInterval(iv); return; }
        window.scrollTo(0, y); tries++;
        if(tries > 60 || Math.abs(scrollY - y) < 2) clearInterval(iv);
      }, 40);
    }
    function run(){ if(hash) scrollToHash(); else restore(); }
    if(document.readyState === 'complete') run();
    else addEventListener('load', run);
  })();
  </script>
